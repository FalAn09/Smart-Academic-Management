name: CI

on:
  pull_request:
    branches: [ "qa", "main" ]

jobs:
  pr-checks:
    name: Lint, Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Verify format (Prettier)
        run: npx nx format:check

      - name: Linting (Only services affected)
        run: npx nx affected -t lint

      - name: Testing (Only services affected)
        run: npx nx affected -t test

      - name: Build de prueba (Only services affected)
        run: npx nx affected -t build